<app-header></app-header>

<div class="offers-container min-h-screen bg-gray-50 pb-20 pt-28">
  <!-- Content -->
  <main class="max-w-7xl px-4 md:px-8 pt-8" style="margin: 0 auto;">
    <div class="flex flex-col lg:flex-row gap-8">
      
      <!-- SIDEBAR -->
      <div class="lg:w-1/5 w-full">
        <app-sidebar></app-sidebar>
      </div>

      <!-- PRODUCT GRID -->
      <div class="lg:w-4/5 w-full">
        <div class="mb-8">
          <h1 class="text-3xl font-black text-gray-800 tracking-tight">{{ categoryTitle() }}</h1>
          <p class="text-gray-500 font-bold uppercase tracking-widest text-sm">Noshahi Pandamart Offers</p>
        </div>

        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3 lg:gap-4">
          @for (prod of products(); track prod.id) {
          <a class="product-card bg-white rounded-2xl p-2.5 shadow-sm border border-gray-100 flex flex-col relative overflow-hidden group hover:shadow-2xl transition-all duration-500 cursor-pointer no-underline block" 
             style="z-index: 50;"
             routerLink="/product/{{prod.id}}" 
             (click)="openProductDetail(prod.id); $event.preventDefault();">
            <!-- Discount Tag -->
            <div class="absolute top-4 left-4 z-10 discount-badge" style="background: #FBCE07; color: #1f2937; font-weight: 900; box-shadow: 0 4px 10px rgba(251, 206, 7, 0.4); font-size: 10px; padding: 3px 8px; border-radius: 6px;">
              {{ prod.discount }}
            </div>
            
            <button class="absolute top-4 right-4 w-8 h-8 rounded-full bg-white/80 backdrop-blur-sm shadow-md flex items-center justify-center text-gray-400 hover:text-red-500 transition-colors z-10 opacity-0 group-hover:opacity-100">
              <i class="far fa-heart text-xs"></i>
            </button>

            <!-- Product Image -->
            <div class="h-24 mb-3 relative group-hover:scale-105 transition-transform duration-500 flex items-center justify-center">
              <img [src]="prod.image" [alt]="prod.name" class="max-h-full object-contain">
            </div>

            <!-- Product Info -->
            <div class="flex flex-col flex-grow">
              <p class="text-gray-400 text-[8px] font-black uppercase tracking-widest mb-0.5">{{ prod.brand }}</p>
              <h3 class="font-black text-gray-800 mb-1.5 line-clamp-2 text-[11px] leading-tight hover:text-custom-yellow-dark transition-colors h-8">
                {{ prod.name }}
              </h3>
              <p class="text-gray-500 font-bold mb-3 text-[10px]">{{ prod.weight }}</p>
              
              <div class="mt-auto flex items-center justify-between">
                <div class="flex flex-col">
                  <span class="text-gray-300 text-[9px] line-through font-bold">Rs. {{ prod.originalPrice }}</span>
                  <span class="text-base font-black" style="color: #EAB308;">Rs. {{ prod.price }}</span>
                </div>
                <button class="add-btn w-8 h-8 rounded-lg flex items-center justify-center shadow-md" style="background: #FBCE07; color: #1f2937; transform: translateZ(15px);">
                  <i class="fas fa-plus text-xs"></i>
                </button>
              </div>
            </div>
          </a>
          }
        </div>

        <!-- Load More Button -->
        <div class="mt-16 flex justify-center" *ngIf="hasMore()">
          <button (click)="loadMore()" [disabled]="isLoading()"
            class="bg-custom-yellow hover:bg-yellow-500 text-gray-800 font-black px-12 py-5 rounded-[2rem] shadow-xl hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-2 active:translate-y-0 uppercase tracking-widest text-sm border-b-8 border-yellow-600 flex items-center gap-3 disabled:opacity-70 disabled:cursor-not-allowed disabled:transform-none"
            style="background-color: #FBCE07; border-color: #EAB308;">
            @if (!isLoading()) {
              Load More Deals
            } @else {
              <i class="fas fa-spinner fa-spin"></i>
              <span>Loading...</span>
            }
          </button>
        </div>
      </div>
    </div>
  </main>
</div>

<app-footer></app-footer>
